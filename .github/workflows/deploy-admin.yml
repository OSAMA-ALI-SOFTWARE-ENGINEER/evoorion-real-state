name: Deploy Admin

on:
  push:
    branches: [master]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build on runner, deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Build admin
        working-directory: apps/admin
        env:
          NEXT_PUBLIC_API_URL: https://evoorian-api-v2.osama-ali.com/api/v1
        run: |
          npm ci
          npm run build

      - name: Package artifacts (source + build, no node_modules)
        run: |
          cd apps/admin
          tar czf ../../admin-deploy.tar.gz --exclude='node_modules' .

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: admin-deploy.tar.gz
          target: /tmp/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=~/domains/osama-ali.com/public_html/evoorion-admin

            cd "$APP_DIR"
            tar xzf /tmp/admin-deploy.tar.gz
            rm /tmp/admin-deploy.tar.gz

            echo "NEXT_PUBLIC_API_URL=https://evoorian-api-v2.osama-ali.com/api/v1" > .env.production

            npm ci --omit=dev

            mkdir -p tmp
            touch tmp/restart.txt
            echo "Admin deployed"
