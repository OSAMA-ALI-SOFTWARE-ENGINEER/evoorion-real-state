name: Deploy Admin

on:
  push:
    branches: [master]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build on runner, deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Build admin
        working-directory: apps/admin
        env:
          NEXT_PUBLIC_API_URL: https://api.evoorionrealestate.com/api/v1
        run: |
          npm ci
          npm run build

      - name: Package standalone artifacts
        run: |
          cd apps/admin
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar czf ../../admin-deploy.tar.gz -C .next/standalone .

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: admin-deploy.tar.gz
          target: ~/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=~/domains/evoorionrealestate.com/public_html/admin

            tar xzf ~/admin-deploy.tar.gz -C "$APP_DIR"
            rm ~/admin-deploy.tar.gz

            mkdir -p "$APP_DIR/tmp"
            touch "$APP_DIR/tmp/restart.txt"
            echo "Admin deployed to admin.evoorionrealestate.com"
