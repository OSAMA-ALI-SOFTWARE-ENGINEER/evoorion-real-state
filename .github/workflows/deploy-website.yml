name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'apps/website/**'
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    name: Deploy Next.js Website to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            REPO_DIR="$HOME/evoorion"
            APP_DIR="$HOME/domains/osama-ali.com/public_html/evoorion"

            echo "→ Pulling latest code..."
            cd "$REPO_DIR"
            git pull origin master

            echo "→ Syncing website files (preserving .env.production)..."
            rsync -a --delete \
              --exclude='.env.production' \
              --exclude='node_modules' \
              --exclude='.next' \
              "$REPO_DIR/apps/website/" "$APP_DIR/"

            echo "→ Installing dependencies..."
            cd "$APP_DIR"
            npm ci --prefer-offline

            echo "→ Building..."
            npm run build

            echo "→ Restarting Node.js app..."
            mkdir -p tmp
            touch tmp/restart.txt

            echo "✓ Website deployed"
