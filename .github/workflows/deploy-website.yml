name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'apps/website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build on runner, deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/website/package-lock.json

      - name: Build website
        working-directory: apps/website
        env:
          NEXT_PUBLIC_API_URL: https://evoorian-api-v2.osama-ali.com/api/v1
        run: |
          npm ci
          npm run build

      - name: Package standalone artifacts
        run: |
          cd apps/website
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar czf ../../website-deploy.tar.gz -C .next/standalone .

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: website-deploy.tar.gz
          target: ~/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=~/domains/osama-ali.com/public_html/evoorion

            tar xzf ~/website-deploy.tar.gz -C "$APP_DIR"
            rm ~/website-deploy.tar.gz

            mkdir -p "$APP_DIR/tmp"
            touch "$APP_DIR/tmp/restart.txt"
            echo "Website deployed"
