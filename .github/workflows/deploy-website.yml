name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'apps/website/**'
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    name: Build on runner, deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/website/package-lock.json

      - name: Build website
        working-directory: apps/website
        env:
          NEXT_PUBLIC_API_URL: https://evoorion-api.osama-ali.com/api/v1
        run: |
          npm ci
          npm run build

      - name: Package artifacts (source + build, no node_modules)
        run: |
          cd apps/website
          tar czf ../../website-deploy.tar.gz --exclude='node_modules' .

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: website-deploy.tar.gz
          target: /tmp/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=~/domains/osama-ali.com/public_html/evoorion

            cd "$APP_DIR"
            tar xzf /tmp/website-deploy.tar.gz
            rm /tmp/website-deploy.tar.gz

            echo "NEXT_PUBLIC_API_URL=https://evoorion-api.osama-ali.com/api/v1" > .env.production

            npm ci --omit=dev

            mkdir -p tmp
            touch tmp/restart.txt
            echo "✓ Website deployed"
