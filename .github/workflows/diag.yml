name: Diagnose Passenger
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check passenger config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== full old website htaccess ==="
            cat ~/domains/osama-ali.com/public_html/evoorion/.htaccess 2>/dev/null || echo "no htaccess"
            echo "=== full old admin htaccess ==="
            cat ~/domains/osama-ali.com/public_html/evoorion-admin/.htaccess 2>/dev/null || echo "no htaccess"
            echo "=== nodejs dir structure ==="
            ls ~/domains/osama-ali.com/nodejs/ 2>/dev/null || echo "no nodejs dir"
            echo "=== nodejs/evoorion files ==="
            ls ~/domains/osama-ali.com/nodejs/evoorion/ 2>/dev/null | head -20
            echo "=== node binary search ==="
            find /usr/local /usr/bin /opt -name "node" -type f 2>/dev/null | head -5
            ls ~/nodevenv/ 2>/dev/null || echo "no nodevenv"
            echo "=== evoorionrealestate dir ==="
            ls ~/domains/evoorionrealestate.com/ 2>/dev/null
