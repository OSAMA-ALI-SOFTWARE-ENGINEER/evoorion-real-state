name: Diagnose Passenger
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check website 503
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== nodejs/website files ==="
            ls ~/domains/evoorionrealestate.com/nodejs/website/ 2>/dev/null || echo "no nodejs/website dir"
            echo "=== nodejs/admin files ==="
            ls ~/domains/evoorionrealestate.com/nodejs/admin/ 2>/dev/null | head -10
            echo "=== public_html files ==="
            ls ~/domains/evoorionrealestate.com/public_html/ 2>/dev/null
            echo "=== public_html .htaccess ==="
            cat ~/domains/evoorionrealestate.com/public_html/.htaccess 2>/dev/null || echo "no htaccess"
            echo "=== website stderr log ==="
            cat ~/domains/evoorionrealestate.com/nodejs/website/stderr.log 2>/dev/null | tail -30 || echo "no stderr log"
            echo "=== try starting server manually ==="
            cd ~/domains/evoorionrealestate.com/nodejs/website && /opt/alt/alt-nodejs20/root/bin/node server.js 2>&1 &
            sleep 3
            kill %1 2>/dev/null || true
