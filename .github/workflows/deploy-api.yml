name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Laravel to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package backend
        run: tar czf api-deploy.tar.gz -C backend .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: api-deploy.tar.gz
          target: ~/

      - name: Extract and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            DIR=~/domains/evoorionrealestate.com/public_html/api
            OLD_DIR=~/domains/osama-ali.com/public_html/evoorian-api-v2

            # Extract backend files (skip .env, storage, vendor)
            tar xzf ~/api-deploy.tar.gz -C "$DIR" \
              --exclude='.env' \
              --exclude='storage' \
              --exclude='vendor'
            rm ~/api-deploy.tar.gz

            # First-time setup: copy .env from old API and update domain
            if [ ! -f "$DIR/.env" ]; then
              cp "$OLD_DIR/.env" "$DIR/.env"
              sed -i "s|APP_URL=.*|APP_URL=https://api.evoorionrealestate.com|" "$DIR/.env"
              sed -i "s|CORS_ALLOWED_ORIGINS=.*|CORS_ALLOWED_ORIGINS=https://evoorionrealestate.com,https://www.evoorionrealestate.com,https://admin.evoorionrealestate.com|" "$DIR/.env"
              echo ".env bootstrapped from old API"
            fi

            # Ensure storage directories exist with correct structure
            mkdir -p "$DIR/storage/app/public"
            mkdir -p "$DIR/storage/framework/cache/data"
            mkdir -p "$DIR/storage/framework/sessions"
            mkdir -p "$DIR/storage/framework/views"
            mkdir -p "$DIR/storage/logs"
            mkdir -p "$DIR/bootstrap/cache"
            chmod -R 775 "$DIR/storage" "$DIR/bootstrap/cache"

            cd "$DIR"
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            echo "API deployed to api.evoorionrealestate.com"
