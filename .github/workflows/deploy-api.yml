name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Trigger Hostinger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server deploy hook
        run: |
          curl -sf -X POST "https://evoorion-api.osama-ali.com/deploy.php" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --max-time 10
