name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Trigger Hostinger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger server deploy hook
        run: |
          STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST "https://evoorion-api.osama-ali.com/deploy" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --max-time 120)
          echo "HTTP Status: $STATUS"
          cat /tmp/response.txt
          if [ "$STATUS" != "200" ]; then exit 1; fi
