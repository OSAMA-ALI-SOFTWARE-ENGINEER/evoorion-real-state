name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Laravel to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package backend
        run: tar czf api-deploy.tar.gz -C backend .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: api-deploy.tar.gz
          target: ~/

      - name: Extract and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            DIR=~/domains/api.evoorionrealestate.com/public_html

            # Extract backend files (skip .env, storage, vendor)
            tar xzf ~/api-deploy.tar.gz -C "$DIR" \
              --exclude='.env' \
              --exclude='storage' \
              --exclude='vendor'
            rm ~/api-deploy.tar.gz

            cd "$DIR"
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            echo "API deployed to api.evoorionrealestate.com"
