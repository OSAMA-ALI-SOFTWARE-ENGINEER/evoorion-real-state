name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Laravel to Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            DIR="/home/u121664729/domains/osama-ali.com/public_html/evoorian-api-v2"
            REPO="git@github.com:OSAMA-ALI-SOFTWARE-ENGINEER/evoorion-real-state.git"
            TMP="/tmp/evoorion-deploy-$$"

            # Pull fresh copy to temp
            GIT_SSH_COMMAND="ssh -i /home/u121664729/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              git clone --depth=1 "$REPO" "$TMP"

            # Sync backend/ into app root (skip .env, storage, vendor)
            rsync -a --delete \
              --exclude='.env' \
              --exclude='storage/' \
              --exclude='vendor/' \
              "$TMP/backend/" "$DIR/"

            rm -rf "$TMP"

            cd "$DIR"
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            echo "API deployed"
