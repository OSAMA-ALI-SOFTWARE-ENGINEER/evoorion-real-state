                search:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: pasyzwszwtxpeqq
                  nullable: true
                area_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the areas table.'
                  example: 12
                  nullable: true
                developer_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the developers table.'
                  example: 12
                  nullable: true
                operation_type_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the operation_types table.'
                  example: 12
                  nullable: true
                type:
                  type: string
                  description: ''
                  example: apartment
                  enum:
                    - villa
                    - apartment
                    - penthouse
                    - townhouse
                    - commercial
                  nullable: true
                featured:
                  type: boolean
                  description: ''
                  example: true
                  nullable: true
                min_price:
                  type: number
                  description: 'Must be at least 0.'
                  example: 0
                  nullable: true
                max_price:
                  type: number
                  description: 'Must be at least 0.'
                  example: 65
                  nullable: true
                bedrooms_min:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 84
                  nullable: true
                bedrooms_max:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 90
                  nullable: true
                bathrooms_min:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 79
                  nullable: true
                sort_by:
                  type: string
                  description: ''
                  example: area_sqft
                  enum:
                    - price
                    - created_at
                    - views_count
                    - area_sqft
                    - bedrooms
                  nullable: true
                sort_direction:
                  type: string
                  description: ''
                  example: desc
                  enum:
                    - asc
                    - desc
                  nullable: true
                page:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 64
                  nullable: true
                per_page:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 100.'
                  example: 25
                  nullable: true
