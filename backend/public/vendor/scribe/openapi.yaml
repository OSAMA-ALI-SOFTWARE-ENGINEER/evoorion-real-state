        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: morgan93@example.net
                token:
                  type: string
                  description: ''
                  example: culpa
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: dx~rc~
              required:
