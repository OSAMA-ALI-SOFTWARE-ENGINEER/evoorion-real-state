openapi: 3.0.3
info:
  title: 'Evoorion Real Estate API'
  description: 'Backend API for the Evoorion real estate platform. Admin endpoints require a Bearer token obtained from POST /api/v1/auth/login.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via POST /api/v1/auth/login. Send as: Authorization: Bearer {token}'
security:
  -
    default: []
paths:
  /api/v1/auth/login:
    post:
      summary: 'User login'
      operationId: userLogin
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: morgan93@example.net
                password:
                  type: string
                  description: ''
                  example: culpa
              required:
                - email
                - password
  /api/v1/auth/register:
    post:
      summary: 'User registration (stub for now)'
      operationId: userRegistrationstubForNow
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: pasyzwszwtxpeqq
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: tremayne.kohler@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '>?R4Usi|L@vH'
              required:
                - name
                - email
                - password
  /api/v1/auth/logout:
    post:
      summary: 'User logout'
      operationId: userLogout
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
  /api/v1/auth/me:
    get:
      summary: 'Get authenticated user profile'
      operationId: getAuthenticatedUserProfile
      description: ''
      parameters: []
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Server Error'
                properties:
                  message:
                    type: string
                    example: 'Server Error'
      tags:
