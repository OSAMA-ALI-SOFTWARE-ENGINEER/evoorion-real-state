openapi: 3.0.3
info:
  title: 'Evoorion Real Estate API'
  description: 'Backend API for the Evoorion real estate platform. Admin endpoints require a Bearer token obtained from POST /api/v1/auth/login.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Auth
    description: "\nAuthentication: login, logout, registration, and current user profile."
  -
    name: Properties
    description: "\nBrowse, search, and view available properties. No authentication required."
  -
    name: Leads
    description: "\nSubmit leads (public) and manage them (admin). Agents see only their assigned leads\nand unassigned leads — not other agents' leads."
  -
    name: 'Lead Tasks'
    description: "\nFollow-up tasks attached to leads. Agents can manage tasks only on their own leads."
  -
    name: 'Agencies & Agents'
    description: "\nManage real estate agencies. Read (list/show) requires agent role; write requires manager or above."
  -
    name: 'Master Data'
    description: "\nReference data: geographic areas. Public read — no authentication required."
  -
    name: 'Dashboard & Reports'
    description: "\nAggregated platform statistics and agent performance metrics. Requires agent role or above."
  -
    name: Notifications
    description: "\nIn-app notifications for the authenticated user. Each user sees only their own notifications."
  -
    name: 'Users & Favorites'
    description: "\nSave and retrieve favorited properties for the authenticated user."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via POST /api/v1/auth/login. Send as: Authorization: Bearer {token}'
security:
  -
    default: []
paths:
  /api/v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate with email and password. Returns a Sanctum bearer token valid until revoked.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    user:
                      id: 1
                      name: 'Jane Smith'
                      email: jane@evoorion.com
                      role: manager
                      is_active: true
                      last_login_at: '2025-01-15T10:00:00.000000Z'
                    token: 1|abc123defghijklmnopqrstuvwxyz
                  message: 'Login successful'
                  meta: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Jane Smith'
                          email:
                            type: string
                            example: jane@evoorion.com
                          role:
                            type: string
                            example: manager
                          is_active:
                            type: boolean
                            example: true
                          last_login_at:
                            type: string
                            example: '2025-01-15T10:00:00.000000Z'
                      token:
                        type: string
                        example: 1|abc123defghijklmnopqrstuvwxyz
                  message:
                    type: string
                    example: 'Login successful'
                  meta:
                    type: array
                    example: []
        422:
          description: 'Invalid credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The provided credentials are incorrect.'
                  errors:
                    email:
                      - 'The provided credentials are incorrect.'
                properties:
                  message:
                    type: string
                    example: 'The provided credentials are incorrect.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The provided credentials are incorrect.'
                        items:
                          type: string
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: morgan93@example.net
                password:
                  type: string
                  description: ''
                  example: culpa
              required:
                - email
                - password
      security: []
  /api/v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: "Create a new user account. The new user receives the 'user' role."
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    user:
                      id: 2
                      name: 'Mark Jones'
                      email: mark@example.com
                      role: user
                      is_active: true
                    token: 2|xyz789abcdefghijklmno
                  message: 'Registration successful'
                  meta: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          name:
                            type: string
                            example: 'Mark Jones'
                          email:
                            type: string
                            example: mark@example.com
                          role:
                            type: string
                            example: user
                          is_active:
                            type: boolean
                            example: true
                      token:
                        type: string
                        example: 2|xyz789abcdefghijklmno
                  message:
                    type: string
                    example: 'Registration successful'
                  meta:
                    type: array
                    example: []
        422:
          description: 'Email taken'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The email has already been taken.'
                  errors:
                    email:
                      - 'The email has already been taken.'
                properties:
                  message:
                    type: string
                    example: 'The email has already been taken.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email has already been taken.'
                        items:
                          type: string
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: pasyzwszwtxpeqq
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: tremayne.kohler@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '>?R4Usi|L@vH'
              required:
                - name
                - email
                - password
      security: []
  /api/v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revokes the current bearer token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data: null
                  message: 'Logout successful'
                  meta: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: null
                    nullable: true
                  message:
                    type: string
                    example: 'Logout successful'
                  meta:
                    type: array
                    example: []
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Auth
  /api/v1/auth/me:
    get:
      summary: 'Current user'
      operationId: currentUser
      description: "Returns the authenticated user's profile."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    name: 'Jane Smith'
                    email: jane@evoorion.com
                    role: manager
                    is_active: true
                    last_login_at: '2025-01-15T10:00:00.000000Z'
                  message: 'User profile retrieved'
                  meta: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Jane Smith'
                      email:
                        type: string
                        example: jane@evoorion.com
                      role:
                        type: string
                        example: manager
                      is_active:
                        type: boolean
                        example: true
                      last_login_at:
                        type: string
                        example: '2025-01-15T10:00:00.000000Z'
                  message:
                    type: string
                    example: 'User profile retrieved'
                  meta:
                    type: array
                    example: []
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Auth
  /api/v1/auth/forgot-password:
    post:
      summary: 'Forgot password'
      operationId: forgotPassword
      description: "Sends a password reset email. Response is always 200 regardless of whether\nthe email is registered — prevents user enumeration."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'If that email exists, a reset link has been sent'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'If that email exists, a reset link has been sent'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: morgan93@example.net
              required:
                - email
      security: []
  /api/v1/auth/reset-password:
    post:
      summary: 'Reset password'
      operationId: resetPassword
      description: 'Resets the password using the token received by email. Revokes all existing Sanctum tokens.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Password reset successfully'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Password reset successfully'
        422:
          description: 'Invalid or expired token'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Invalid or expired token'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invalid or expired token'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: morgan93@example.net
                token:
                  type: string
                  description: ''
                  example: culpa
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: dx~rc~
              required:
                - email
                - token
                - password
      security: []
  /api/v1/properties:
    get:
      summary: 'List properties'
      operationId: listProperties
      description: 'Paginated list of available properties. Supports filtering, sorting, and search.'
      parameters:
        -
          in: query
          name: search
          description: 'Keyword search on title and description.'
          example: 'Palm Jumeirah'
          required: false
          schema:
            type: string
            description: 'Keyword search on title and description.'
            example: 'Palm Jumeirah'
        -
          in: query
          name: area_id
          description: 'Filter by area ID.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by area ID.'
            example: 1
        -
          in: query
          name: operation_type_id
          description: 'Filter by operation type ID.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by operation type ID.'
            example: 1
        -
          in: query
          name: type
          description: 'Filter by type. Allowed: villa, apartment, penthouse, townhouse, commercial.'
          example: villa
          required: false
          schema:
            type: string
            description: 'Filter by type. Allowed: villa, apartment, penthouse, townhouse, commercial.'
            example: villa
        -
          in: query
          name: featured
          description: 'Show only featured properties.'
          example: true
          required: false
          schema:
            type: boolean
            description: 'Show only featured properties.'
            example: true
        -
          in: query
          name: min_price
          description: 'Minimum price.'
          example: 500000.0
          required: false
          schema:
            type: number
            description: 'Minimum price.'
            example: 500000.0
        -
          in: query
          name: max_price
          description: 'Maximum price.'
          example: 3000000.0
          required: false
          schema:
            type: number
            description: 'Maximum price.'
            example: 3000000.0
        -
          in: query
          name: developer_id
          description: 'Filter by developer ID.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by developer ID.'
            example: 1
        -
          in: query
          name: bedrooms_min
          description: 'Minimum bedrooms.'
          example: 2
          required: false
          schema:
            type: integer
            description: 'Minimum bedrooms.'
            example: 2
        -
          in: query
          name: bedrooms_max
          description: 'Maximum bedrooms.'
          example: 4
          required: false
          schema:
            type: integer
            description: 'Maximum bedrooms.'
            example: 4
        -
          in: query
          name: bathrooms_min
          description: 'Minimum bathrooms.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Minimum bathrooms.'
            example: 1
        -
          in: query
          name: sort_by
          description: 'Field to sort by. Default: created_at.'
          example: price
          required: false
          schema:
            type: string
            description: 'Field to sort by. Default: created_at.'
            example: price
        -
          in: query
          name: sort_direction
          description: 'asc or desc. Default: desc.'
          example: asc
          required: false
          schema:
            type: string
            description: 'asc or desc. Default: desc.'
            example: asc
        -
          in: query
          name: per_page
          description: 'Items per page. Default: 15.'
          example: 15
          required: false
          schema:
            type: integer
            description: 'Items per page. Default: 15.'
            example: 15
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    -
                      id: 1
                      title: 'Luxury Villa in Palm Jumeirah'
                      slug: luxury-villa-palm-jumeirah
                      type: villa
                      price: '2500000.00'
                      currency: AED
                      bedrooms: 4
                      bathrooms: 3
                      area_sqft: '4500.00'
                      status: available
                      is_featured: true
                      views_count: 120
                      created_at: '2025-01-15T10:00:00.000000Z'
                  message: 'Operation successful'
                  meta:
                    pagination:
                      current_page: 1
                      total: 42
                      per_page: 15
                      last_page: 3
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        title: 'Luxury Villa in Palm Jumeirah'
                        slug: luxury-villa-palm-jumeirah
                        type: villa
                        price: '2500000.00'
                        currency: AED
                        bedrooms: 4
                        bathrooms: 3
                        area_sqft: '4500.00'
                        status: available
                        is_featured: true
                        views_count: 120
                        created_at: '2025-01-15T10:00:00.000000Z'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        title:
                          type: string
                          example: 'Luxury Villa in Palm Jumeirah'
                        slug:
                          type: string
                          example: luxury-villa-palm-jumeirah
                        type:
                          type: string
                          example: villa
                        price:
                          type: string
                          example: '2500000.00'
                        currency:
                          type: string
                          example: AED
                        bedrooms:
                          type: integer
                          example: 4
                        bathrooms:
                          type: integer
                          example: 3
                        area_sqft:
                          type: string
                          example: '4500.00'
                        status:
                          type: string
                          example: available
                        is_featured:
                          type: boolean
                          example: true
                        views_count:
                          type: integer
                          example: 120
                        created_at:
                          type: string
                          example: '2025-01-15T10:00:00.000000Z'
                  message:
                    type: string
                    example: 'Operation successful'
                  meta:
                    type: object
                    properties:
                      pagination:
                        type: object
                        properties:
                          current_page:
                            type: integer
                            example: 1
                          total:
                            type: integer
                            example: 42
                          per_page:
                            type: integer
                            example: 15
                          last_page:
                            type: integer
                            example: 3
      tags:
        - Properties
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: pasyzwszwtxpeqq
                  nullable: true
                area_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the areas table.'
                  example: 12
                  nullable: true
                developer_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the developers table.'
                  example: 12
                  nullable: true
                operation_type_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the operation_types table.'
                  example: 12
                  nullable: true
                type:
                  type: string
                  description: ''
                  example: villa
                  enum:
                    - villa
                    - apartment
                    - penthouse
                    - townhouse
                    - commercial
                  nullable: true
                featured:
                  type: boolean
                  description: ''
                  example: true
                  nullable: true
                min_price:
                  type: number
                  description: 'Must be at least 0.'
                  example: 0
                  nullable: true
                max_price:
                  type: number
                  description: 'Must be at least 0.'
                  example: 65
                  nullable: true
                bedrooms_min:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 84
                  nullable: true
                bedrooms_max:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 90
                  nullable: true
                bathrooms_min:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 79
                  nullable: true
                sort_by:
                  type: string
                  description: ''
                  example: area_sqft
                  enum:
                    - price
                    - created_at
                    - views_count
                    - area_sqft
                    - bedrooms
                  nullable: true
                sort_direction:
                  type: string
                  description: ''
                  example: asc
                  enum:
                    - asc
                    - desc
                  nullable: true
                page:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 64
                  nullable: true
                per_page:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 100.'
                  example: 25
                  nullable: true
      security: []
  '/api/v1/properties/{property_slug}':
    get:
      summary: 'Get property'
      operationId: getProperty
      description: 'Retrieve a single property by slug. Increments the view count on each call.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    title: 'Luxury Villa in Palm Jumeirah'
                    slug: luxury-villa-palm-jumeirah
                    description: 'A stunning 4-bedroom villa with private pool and sea view.'
                    type: villa
                    price: '2500000.00'
                    currency: AED
                    bedrooms: 4
                    bathrooms: 3
                    area_sqft: '4500.00'
                    status: available
                    is_featured: true
                    roi_min: '6.00'
                    roi_max: '8.00'
                    views_count: 121
                    area:
                      id: 1
                      name: 'Palm Jumeirah'
                    developer:
                      id: 1
                      name: 'Emaar Properties'
                    operation_type:
                      id: 1
                      name: 'For Sale'
                    images:
                      -
                        id: 1
                        url: 'https://res.cloudinary.com/demo/image/upload/v1/villa.jpg'
                        is_primary: true
                    amenities:
                      -
                        id: 1
                        name: 'Swimming Pool'
                      -
                        id: 2
                        name: Gym
                    created_at: '2025-01-15T10:00:00.000000Z'
                    updated_at: '2025-01-20T08:30:00.000000Z'
                  message: 'Operation successful'
                  meta: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      title:
                        type: string
                        example: 'Luxury Villa in Palm Jumeirah'
                      slug:
                        type: string
                        example: luxury-villa-palm-jumeirah
                      description:
                        type: string
                        example: 'A stunning 4-bedroom villa with private pool and sea view.'
                      type:
                        type: string
                        example: villa
                      price:
                        type: string
                        example: '2500000.00'
                      currency:
                        type: string
                        example: AED
                      bedrooms:
                        type: integer
                        example: 4
                      bathrooms:
                        type: integer
                        example: 3
                      area_sqft:
                        type: string
                        example: '4500.00'
                      status:
                        type: string
                        example: available
                      is_featured:
                        type: boolean
                        example: true
                      roi_min:
                        type: string
                        example: '6.00'
                      roi_max:
                        type: string
                        example: '8.00'
                      views_count:
                        type: integer
                        example: 121
                      area:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Palm Jumeirah'
                      developer:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Emaar Properties'
                      operation_type:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'For Sale'
                      images:
                        type: array
                        example:
                          -
                            id: 1
                            url: 'https://res.cloudinary.com/demo/image/upload/v1/villa.jpg'
                            is_primary: true
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            url:
                              type: string
                              example: 'https://res.cloudinary.com/demo/image/upload/v1/villa.jpg'
                            is_primary:
                              type: boolean
                              example: true
                      amenities:
                        type: array
                        example:
                          -
                            id: 1
                            name: 'Swimming Pool'
                          -
                            id: 2
                            name: Gym
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name:
                              type: string
                              example: 'Swimming Pool'
                      created_at:
                        type: string
                        example: '2025-01-15T10:00:00.000000Z'
                      updated_at:
                        type: string
                        example: '2025-01-20T08:30:00.000000Z'
                  message:
                    type: string
                    example: 'Operation successful'
                  meta:
                    type: array
                    example: []
        404:
          description: 'Not found'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'No query results for model [App\Models\Property].'
                properties:
                  message:
                    type: string
                    example: 'No query results for model [App\Models\Property].'
      tags:
        - Properties
      security: []
    parameters:
      -
        in: path
        name: property_slug
        description: 'The slug of the property.'
        example: culpa
        required: true
        schema:
          type: string
  /api/v1/properties/compare:
    post:
      summary: 'Compare properties'
      operationId: compareProperties
      description: "Compare 2 to 4 available properties by slug. Returns them in the requested order\nplus a summary identifying the cheapest, most bedrooms, and largest by sqft."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    properties:
                      -
                        id: 1
                        title: 'Luxury Villa'
                        slug: luxury-villa-palm-jumeirah
                        price: '2500000.00'
                        bedrooms: 4
